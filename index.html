<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYTAC PANEL | Canlı Komuta Merkezi</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- PARLAYAN MENÜ BUTONU -->
    <div class="menu-toggle" id="menuBtn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </div>

    <!-- KAYAR YAN MENÜ -->
    <div class="sidebar" id="sidebar">
        <div class="logo">🔍 WAYTAC <span>PANEL</span></div>
        <div class="menu-section">
            <a href="#" class="active" onclick="location.reload()"><i class="fas fa-home"></i> Dashboard</a>
        </div>
        <div class="menu-section">
            <p class="section-title">SORGU ODACIKLARI</p>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDropdown('mernis-sub')">
                    <i class="fas fa-database"></i> Mernis 2026 <i class="fas fa-chevron-down arrow"></i>
                </button>
                <div id="mernis-sub" class="dropdown-content">
                    <a href="#" onclick="showSorgu('Ad Soyad', 'Ad Soyad')">• Ad Soyad</a>
                    <a href="#" onclick="showSorgu('TC Pro', 'T.C. No')">• TC Pro <span class="badge">V1</span></a>
                </div>
            </div>
            <a href="#" onclick="showSorgu('GSM', 'Telefon No')"><i class="fas fa-phone"></i> GSM Çözümleri</a>
        </div>
        <div class="status-bar">⚡ Güç: %63 | <span class="online">WAYTAC_ACTIVE</span></div>
    </div>

    <!-- KARARTMA KATMANI -->
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <main id="main-content">
        <div id="dynamic-area">
            <div class="reklam-box">REKLAM ALANI <br><small>Bu alan #WAYTAC operasyonları için ayrılmıştır</small></div>
            <div class="stats-grid">
                <div class="stat-card">
                    <p>Toplam Kullanıcı</p>
                    <h3><span id="total-users">35361</span></h3>
                    <small>Bugün <span class="blue">2189</span> yeni kayıt</small>
                </div>
                <div class="stat-card">
                    <p>Sorgu Sayısı</p>
                    <h3><span id="total-queries">521845</span></h3>
                    <small>Sistemde <span class="blue">521708</span> sorgu yapıldı</small>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
