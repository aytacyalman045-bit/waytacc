<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYTAC | Komuta Merkezi</title>
    
    <link rel="icon" href="https://icons8.com" type="image/x-icon">
    
    <script>
        // 1. SİBER GÜVENLİK VE KAYIT MOTORU
        function checkSession() {
            if (!localStorage.getItem('waytac_session')) {
                document.body.innerHTML = `
                <div id="auth-container" style="background:#05070a; color:white; height:100vh; display:flex; align-items:center; justify-content:center; font-family:sans-serif; flex-direction:column; padding:20px;">
                    <div id="login-box" style="background:#161b22; padding:40px; border-radius:24px; border:1px solid #30363d; width:100%; max-width:400px; text-align:center; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
                        <h2 style="margin-bottom:20px; color:#2f81f7;">🔍 WAYTAC LOGIN</h2>
                        <input type="text" id="l_user" placeholder="Kullanıcı Adı veya E-posta" style="width:100%; padding:15px; margin-bottom:15px; background:#0d1117; border:1px solid #30363d; border-radius:12px; color:white; outline:none;">
                        <input type="password" id="l_pass" placeholder="Şifre" style="width:100%; padding:15px; margin-bottom:20px; background:#0d1117; border:1px solid #30363d; border-radius:12px; color:white; outline:none;">
                        <button onclick="doLogin()" style="width:100%; padding:15px; background:#2f81f7; border:none; border-radius:12px; color:white; font-weight:bold; cursor:pointer; margin-bottom:15px;">SİSTEME SIZ</button>
                        <span onclick="toggleAuth()" style="color:#8b949e; cursor:pointer; font-size:13px;">Hesabın yok mu? <b style="color:#2f81f7;">Kayıt Ol</b></span>
                    </div>
                    <div id="reg-box" style="display:none; background:#161b22; padding:40px; border-radius:24px; border:1px solid #30363d; width:100%; max-width:400px; text-align:center;">
                        <h2 style="margin-bottom:20px; color:#2f81f7;">📧 E-POSTA KAYIT</h2>
                        <input type="email" id="r_email" placeholder="E-posta Adresiniz" style="width:100%; padding:15px; margin-bottom:15px; background:#0d1117; border:1px solid #30363d; border-radius:12px; color:white; outline:none;">
                        <input type="password" id="r_pass" placeholder="Şifre Belirleyin" style="width:100%; padding:15px; margin-bottom:20px; background:#0d1117; border:1px solid #30363d; border-radius:12px; color:white; outline:none;">
                        <button onclick="doRegister()" style="width:100%; padding:15px; background:#2f81f7; border:none; border-radius:12px; color:white; font-weight:bold; cursor:pointer; margin-bottom:15px;">KAYDI TAMAMLA</button>
                        <span onclick="toggleAuth()" style="color:#8b949e; cursor:pointer; font-size:13px;">Zaten üye misin? <b style="color:#2f81f7;">Giriş Yap</b></span>
                    </div>
                </div>`;
            }
        }
        function toggleAuth() { const lb = document.getElementById('login-box'); const rb = document.getElementById('reg-box'); lb.style.display = lb.style.display === 'none' ? 'block' : 'none'; rb.style.display = rb.style.display === 'none' ? 'block' : 'none'; }
        function doRegister() { const e = document.getElementById('r_email').value; const p = document.getElementById('r_pass').value; if(e && p) { localStorage.setItem('u_data_'+e, p); alert("Kayıt Başarılı!"); toggleAuth(); } }
        function doLogin() { 
            const u = document.getElementById('l_user').value; const p = document.getElementById('l_pass').value;
            if((u === "waytac" && p === "aytac1235") || (localStorage.getItem('u_data_'+u) === p)) { localStorage.setItem('waytac_session', u); location.reload(); } else { alert("Hatalı Giriş!"); }
        }
    </script>

    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --bg: #05070a; --sidebar: #0a0d14; --accent: #2f81f7; --text: #8b949e; --card: #10141c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }
        .menu-toggle { position: fixed; top: 25px; left: 25px; background: var(--accent); color: white; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 15px; cursor: pointer; z-index: 2000; box-shadow: 0 0 20px rgba(47,129,247,0.4); }
        .sidebar { width: 280px; height: 100vh; background: var(--sidebar); position: fixed; left: -280px; top: 0; border-right: 1px solid #1e293b; padding: 30px; z-index: 1500; transition: 0.3s; overflow-y: auto; }
        .sidebar.active { left: 0; }
        .logo { font-size: 22px; font-weight: 800; margin-bottom: 40px; margin-top: 50px; text-align: center; }
        .logo span { color: var(--accent); }
        .menu-section a, .dropbtn { display: flex; align-items: center; width: 100%; padding: 14px; color: var(--text); text-decoration: none; border-radius: 12px; background: none; border: none; cursor: pointer; font-size: 14px; margin-bottom: 5px; }
        .menu-section a:hover, .dropbtn:hover { background: #1f2937; color: white; }
        .menu-section i { margin-right: 15px; width: 20px; text-align: center; color: var(--accent); }
        .dropdown-content { display: none; padding-left: 20px; flex-direction: column; }
        .dropdown-content a { font-size: 13px; color: #64748b; padding: 10px; border-radius: 8px; text-decoration: none; }
        main { width: 100%; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .stat-card { background: var(--card); border: 1px solid #30363d; border-radius: 30px; padding: 40px; max-width: 500px; width: 100%; text-align: center; }
        
        /* SONUÇ TASARIMI */
        #terminal-log { background: #000; color: #2f81f7; font-family: monospace; font-size: 12px; padding: 15px; border-radius: 10px; margin-top: 20px; text-align: left; height: 130px; overflow-y: auto; border: 1px solid #1e293b; display: none; }
        .result-box { background: #1a1f26; padding: 20px; border-radius: 15px; margin-top: 20px; text-align: left; border-left: 4px solid #2f81f7; display: none; animation: slideIn 0.5s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1400; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }
    </style>
</head>
<body onload="checkSession()">

    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo">🔍 WAYTAC <span>PANEL</span></div>
        <div class="menu-section">
            <a href="#" onclick="location.reload()"><i class="fas fa-home"></i> Ana Sayfa</a>
            <a href="#" onclick="localStorage.removeItem('waytac_session'); location.reload();"><i class="fas fa-power-off"></i> Çıkış Yap</a>
        </div>
        <div class="menu-section">
            <p style="font-size:11px; color:#444; margin:10px 0 10px 10px; text-transform:uppercase;">Operasyonlar</p>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDrop(this)"><i class="fas fa-user-secret"></i> Mernis 2026 <i class="fas fa-chevron-right arrow" style="margin-left:auto"></i></button>
                <div class="dropdown-content">
                    <a href="#" onclick="showSorgu('Ad Soyad', 'İsim Soyisim')">• Ad Soyad Sorgula</a>
                    <a href="#" onclick="showSorgu('TC Pro', 'T.C. No')">• TC Pro Sorgula</a>
                </div>
            </div>
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDrop(this)"><i class="fas fa-users"></i> Aile Çözümleri <i class="fas fa-chevron-right arrow" style="margin-left:auto"></i></button>
                <div class="dropdown-content">
                    <a href="#" onclick="showSorgu('Aile', 'T.C. No')">• Aile Sorgula</a>
                    <a href="#" onclick="showSorgu('Eş', 'T.C. No')">• Eş Sorgula</a>
                </div>
            </div>
        </div>
    </div>

    <main>
        <div id="dynamic-area">
            <div class="stat-card">
                <h1>Operatör <span style="color:#2f81f7;">#WAYTAC</span></h1>
                <p style="color:#8b949e; margin-top:10px;">Merkezi ağa bağlandınız. Sistem infaz için hazır.</p>
                <div style="display:flex; gap:15px; margin-top:30px;">
                    <div style="background:#1f2937; padding:15px; border-radius:15px; flex:1;"><span style="color:#2f81f7; font-size:12px; display:block;">Kullanıcı</span><span style="font-size:22px; font-weight:bold;">1</span></div>
                    <div style="background:#1f2937; padding:15px; border-radius:15px; flex:1;"><span style="color:#2f81f7; font-size:12px; display:block;">İnfaz</span><span id="s-count" style="font-size:22px; font-weight:bold;">0</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() { document.getElementById("sidebar").classList.toggle("active"); document.getElementById("overlay").classList.toggle("active"); }
        function toggleDrop(btn) { const content = btn.nextElementSibling; content.style.display = content.style.display === 'flex' ? 'none' : 'flex'; }
        
        function showSorgu(t, p) {
            document.getElementById('dynamic-area').innerHTML = `<div class="stat-card"><h2 style="color:#2f81f7;">${t.toUpperCase()} SİSTEMİ</h2><input type="text" id="target" placeholder="${p}..." style="width:100%; padding:16px; margin:20px 0; background:#0d1117; border:1px solid #334155; color:white; border-radius:12px; outline:none; text-align:center;"><button onclick="startInfaz()" style="width:100%; padding:16px; background:#2f81f7; color:white; border:none; border-radius:12px; font-weight:bold; cursor:pointer;">İNFAZ ET</button><div id="terminal-log"></div><div id="result-box" class="result-box"></div></div>`;
            toggleSidebar();
        }

        function startInfaz() {
            const val = document.getElementById('target').value;
            if(!val) return alert("Hedef Belirlenmedi!");
            const log = document.getElementById('terminal-log');
            const res = document.getElementById('result-box');
            log.style.display = "block"; res.style.display = "none";
            log.innerHTML = "> Protokoller başlatılıyor...<br>";
            setTimeout(() => { log.innerHTML += "> Veri katmanları aşılıyor...<br>"; }, 600);
            setTimeout(() => { log.innerHTML += "> Deşifre tamamlandı. Veriler çekiliyor...<br>"; }, 1400);
            setTimeout(() => {
                log.style.display = "none"; res.style.display = "block";
                const fakeNames = ["AYTAÇ YALMAN", "CANER ÖZTÜRK", "SELİN YILMAZ", "MERT DEMİR", "BURAK KAYA"];
                const fakeCities = ["İSTANBUL / KADIKÖY", "ANKARA / ÇANKAYA", "İZMİR / KONAK", "ANTALYA / MURATPAŞA"];
                const randTC = Math.floor(10000000000 + Math.random() * 90000000000);
                const randName = fakeNames[Math.floor(Math.random() * fakeNames.length)];
                const randCity = fakeCities[Math.floor(Math.random() * fakeCities.length)];
                
                res.innerHTML = `
                    <p style="color:#2f81f7; font-weight:bold; margin-bottom:10px; border-bottom:1px solid #334155; padding-bottom:5px;">🎯 SORGULAMA SONUCU</p>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; font-size:13px;">
                        <p><b style="color:#8b949e;">AD SOYAD:</b><br>${randName}</p>
                        <p><b style="color:#8b949e;">T.C. NO:</b><br>${randTC}</p>
                        <p><b style="color:#8b949e;">ADRES:</b><br>${randCity}</p>
                        <p><b style="color:#8b949e;">DURUM:</b><br><span style="color:#10b981;">AKTİF</span></p>
                    </div>`;
                document.getElementById('s-count').innerText = parseInt(document.getElementById('s-count').innerText) + 1;
            }, 2200);
        }
    </script>
</body>
</html>
