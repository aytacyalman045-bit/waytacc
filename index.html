<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYTAC PANEL | Komuta Merkezi</title>
    
    <script>
        // YUMUŞATILMIŞ KONTROL: Sayfayı durdurmaz, sadece yönlendirir.
        if (!localStorage.getItem('waytac_session')) {
            window.location.href = 'login.html';
        }
    </script>

    <!-- İkonlar ve Tasarım Şart -->
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root { --bg: #0d1117; --sidebar: #11151c; --accent: #2f81f7; --text: #8b949e; --card: #161b22; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; overflow-x: hidden; min-height: 100vh; }

        /* 3 ÇİZGİ - SOL ÜSTTE ÇOK BELİRGİN */
        .menu-toggle {
            position: fixed; top: 20px; left: 20px; 
            background: var(--accent); color: white; 
            width: 50px; height: 50px; display: flex;
            align-items: center; justify-content: center;
            border-radius: 15px; cursor: pointer; z-index: 2000;
            box-shadow: 0 0 20px rgba(47, 129, 247, 0.6);
            font-size: 20px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px; height: 100vh; background: var(--sidebar);
            position: fixed; left: -280px; top: 0; border-right: 1px solid #30363d;
            padding: 25px; z-index: 1500; transition: 0.3s ease;
            overflow-y: auto;
        }
        .sidebar.active { left: 0; }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1400; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }

        .logo { font-size: 22px; font-weight: 800; margin-bottom: 30px; margin-top: 60px; text-align: center; }
        .logo span { color: var(--accent); }

        .menu-section a, .dropbtn { 
            display: flex; align-items: center; width: 100%; padding: 14px; 
            color: var(--text); text-decoration: none; border-radius: 12px; 
            background: none; border: none; cursor: pointer; font-size: 15px; margin-bottom: 5px;
        }
        .menu-section a:hover, .dropbtn:hover { background: #1f2937; color: white; }
        .menu-section i { margin-right: 15px; width: 20px; text-align: center; color: var(--accent); }

        .dropdown-content { display: none; padding-left: 20px; flex-direction: column; }
        .dropdown-content a { font-size: 14px; color: #c9d1d9; padding: 10px; border-radius: 8px; text-decoration: none; }
        .arrow { margin-left: auto; transition: 0.3s; }

        /* ANA PANEL */
        main { width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .stat-card { background: var(--card); border: 1px solid #30363d; border-radius: 28px; padding: 45px; max-width: 500px; width: 100%; text-align: center; margin-top: 50px; }
        .stats-grid { display: flex; gap: 15px; margin-top: 35px; }
        .stat-item { background: #1f2937; padding: 18px; border-radius: 18px; flex: 1; border: 1px solid #30363d; }
        .stat-label { color: var(--accent); font-size: 12px; display: block; font-weight: bold; }
        .stat-value { font-size: 24px; font-weight: 800; }
    </style>
</head>
<body>

    <!-- Menü Butonu -->
    <div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <!-- Yan Menü -->
    <div class="sidebar" id="sidebar">
        <div class="logo">🔍 WAYTAC <span>PANEL</span></div>
        
        <div class="menu-section">
            <a href="#" onclick="location.reload()"><i class="fas fa-home"></i> Ana Sayfa</a>
            <a href="#" onclick="showSorgu('Market', 'Ürün Adı')"><i class="fas fa-shopping-basket"></i> Market</a>
            <a href="#" onclick="cikisYap()"><i class="fas fa-sign-out-alt"></i> Güvenli Çıkış</a>
        </div>

        <div class="menu-section">
            <p style="color:var(--text); font-size:11px; margin:20px 0 10px 10px; text-transform:uppercase;">Sorgu Çözümleri</p>
            
            <div class="dropdown">
                <button class="dropbtn" onclick="toggleDrop(this)"><i class="fas fa-user-shield"></i> Mernis 2026 <i class="fas fa-chevron-right arrow"></i></button>
                <div class="dropdown-content">
                    <a href="#" onclick="showSorgu('Ad Soyad', 'İsim Soyisim')">• Ad Soyad</a>
                    <a href="#" onclick="showSorgu('TC Kimlik', 'T.C. No')">• TC Kimlik</a>
                </div>
            </div>
            
            <a href="#" style="color: #fbbf24;"><i class="fas fa-crown"></i> Premium Odacık</a>
        </div>
    </div>

    <!-- Orta Ekran -->
    <main>
        <div id="dynamic-area">
            <div class="stat-card">
                <h1>Hoş Geldin Operatör #WAYTAC</h1>
                <p style="color:var(--text); margin: 10px 0;">Sistem mühürlendi. Menüden bir odacık seç.</p>
                <div class="stats-grid">
                    <div class="stat-item"><span class="stat-label">Kullanıcı:</span><span class="stat-value">1</span></div>
                    <div class="stat-item"><span class="stat-label">Sorgu:</span><span class="stat-value">0</span></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
            document.getElementById("overlay").classList.toggle("active");
        }
        function toggleDrop(btn) {
            const content = btn.nextElementSibling;
            const arrow = btn.querySelector('.arrow');
            const isOpen = content.style.display === 'flex';
            content.style.display = isOpen ? 'none' : 'flex';
            arrow.style.transform = isOpen ? 'rotate(0deg)' : 'rotate(90deg)';
        }
        function cikisYap() { 
            localStorage.removeItem('waytac_session'); 
            window.location.href = 'login.html'; 
        }
        function showSorgu(t, p) {
            document.getElementById('dynamic-area').innerHTML = `
            <div class="stat-card">
                <h2 style="color:var(--accent);">${t}</h2>
                <input type="text" placeholder="${p}..." style="width:100%; padding:15px; margin:20px 0; background:#0d1117; border:1px solid #334155; color:white; border-radius:10px; outline:none;">
                <button onclick="alert('İşlem başlatıldı!')" style="width:100%; padding:15px; background:var(--accent); color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">BAŞLAT</button>
            </div>`;
            toggleSidebar();
        }
    </script>
</body>
</html>
