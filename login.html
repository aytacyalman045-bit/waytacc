<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYTAC | Giriş Merkezi</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #2f81f7; --text: #8b949e; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .auth-card { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid #30363d; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo { font-size: 28px; font-weight: 800; margin-bottom: 10px; }
        .logo span { color: var(--accent); }
        p { color: var(--text); font-size: 14px; margin-bottom: 30px; }

        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #0d1117; border: 1px solid #30363d; border-radius: 12px; color: white; outline: none; }
        input:focus { border-color: var(--accent); }

        button { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .toggle-link { margin-top: 20px; font-size: 13px; color: var(--text); cursor: pointer; display: block; }
        .toggle-link span { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <div class="auth-card" id="login-form">
        <div class="logo">🔍 WAYTAC <span>LOGIN</span></div>
        <p>Devam etmek için yetkilerini doğrula.</p>
        <input type="email" id="login-email" placeholder="E-posta Adresi">
        <input type="password" id="login-pass" placeholder="Şifre">
        <button onclick="handleLogin()">SİSTEME SIZ</button>
        <span class="toggle-link" onclick="toggleForms()">Hesabın yok mu? <span>Kayıt Ol</span></span>
    </div>

    <div class="auth-card" id="register-form" style="display: none;">
        <div class="logo">🔍 WAYTAC <span>KAYIT</span></div>
        <p>Yeni operatör profili oluştur.</p>
        <input type="email" id="reg-email" placeholder="E-posta Adresi">
        <input type="password" id="reg-pass" placeholder="Güçlü Bir Şifre">
        <button onclick="handleRegister()">PROTOKOLÜ BAŞLAT</button>
        <span class="toggle-link" onclick="toggleForms()">Zaten üye misin? <span>Giriş Yap</span></span>
    </div>

    <script>
        // Formlar arası geçiş
        function toggleForms() {
            const login = document.getElementById('login-form');
            const reg = document.getElementById('register-form');
            login.style.display = login.style.display === 'none' ? 'block' : 'none';
            reg.style.display = reg.style.display === 'none' ? 'block' : 'none';
        }

        // Kayıt İşlemi (Local üzerinde tutar)
        function handleRegister() {
            const email = document.getElementById('reg-email').value;
            const pass = document.getElementById('reg-pass').value;

            if (email && pass) {
                localStorage.setItem('user_' + email, pass);
                alert("Operatör kaydı başarılı! Şimdi giriş yapabilirsin.");
                toggleForms();
            } else {
                alert("Tüm alanları doldur!");
            }
        }

        // Giriş İşlemi
        function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            const savedPass = localStorage.getItem('user_' + email);

            if (savedPass && savedPass === pass) {
                localStorage.setItem('waytac_session', 'active_' + email);
                window.location.href = 'index.html'; // Ana panele gönder
            } else {
                alert("Yetki reddedildi! E-posta veya şifre hatalı.");
            }
        }
    </script>
</body>
</html>
