<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYTAC PANEL | Giriş Kapısı</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: #0f172a; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h1 { color: #3b82f6; margin-bottom: 10px; font-size: 24px; }
        input { width: 100%; padding: 15px; background: #0f172a; border: 1px solid #334155; color: #fff; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #3b82f6; border: none; color: #fff; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #2563eb; box-shadow: 0 0 15px #3b82f6; }
        .footer-link { margin-top: 20px; font-size: 13px; color: #94a3b8; cursor: pointer; }
        .cloudflare-sim { background: #fff; color: #000; padding: 10px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card" id="auth-box">
        <h1>WAYTAC PANEL</h1>
        <p id="auth-title" style="color:#94a3b8; margin-bottom:20px;">Hesabınıza giriş yapın</p>
        
        <div class="cloudflare-sim">
            <span style="color:#16a34a">✅ Doğrulandı</span>
            <span>CLOUDFLARE TURNSTILE</span>
        </div>

        <input type="text" id="user" placeholder="Kullanıcı Adı">
        <input type="password" id="pass" placeholder="Şifre">
        
        <button class="btn" onclick="handleAuth()" id="auth-btn">Giriş Yap</button>
        
        <p class="footer-link" onclick="switchAuth()" id="switch-btn">Hesabınız yok mu? Kayıt Ol</p>
    </div>

    <script>
        let isLogin = true;

        function switchAuth() {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Hesabınıza giriş yapın" : "Yeni operatör kaydı oluştur";
            document.getElementById('auth-btn').innerText = isLogin ? "Giriş Yap" : "Kayıt Ol";
            document.getElementById('switch-btn').innerText = isLogin ? "Hesabınız yok mu? Kayıt Ol" : "Zaten hesabınız var mı? Giriş Yap";
        }

        function handleAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(!u || !p) return alert("Bilgileri boş bırakma!");

            if(isLogin) {
                // Giriş Kontrolü
                const savedPass = localStorage.getItem(u);
                if(savedPass === p) {
                    localStorage.setItem('waytac_session', u); // Giriş mühürü
                    location.href = 'index.html';
                } else {
                    alert("Hatalı kullanıcı adı veya şifre!");
                }
            } else {
                // Kayıt İşlemi
                localStorage.setItem(u, p);
                alert("Kayıt başarılı! Şimdi giriş yapabilirsiniz.");
                switchAuth();
            }
        }
    </script>
</body>
</html>
