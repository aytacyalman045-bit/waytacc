<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WAYTAC PANEL | Sistem Girişi</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        body { background: #0f172a; color: #fff; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 35px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; border: 1px solid #334155; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: #3b82f6; font-size: 26px; margin-bottom: 5px; letter-spacing: 2px; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #334155; color: #fff; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .cf-verify { background: #111827; border: 1px solid #374151; padding: 12px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 12px; }
        .btn { width: 100%; padding: 15px; background: #3b82f6; border: none; color: #fff; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #2563eb; box-shadow: 0 0 15px #3b82f6; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>WAYTAC PANEL</h1>
        <p style="color:#64748b; margin-bottom:20px;">Operatör Girişi</p>
        <div class="cf-verify"><span style="color:#16a34a">✅ Doğrulandı</span><span>CLOUDFLARE TURNSTILE</span></div>
        
        <input type="text" id="user" placeholder="Kullanıcı Adı">
        <input type="password" id="pass" placeholder="Sistem Şifresi">
        
        <button class="btn" onclick="handleAuth()">Giriş Yap</button>
    </div>

    <script>
        function handleAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;

            // ÖZEL MÜHÜR: waytac | aytac1235
            if(u === 'waytac' && p === 'aytac1235') {
                localStorage.setItem('waytac_session', 'BARON_ACTIVE');
                alert("📡 Erişim Onaylandı. Karargaha giriliyor...");
                location.href = 'index.html';
            } else {
                alert("❌ YETKİSİZ ERİŞİM! Operatör bilgileri hatalı.");
            }
        }
    </script>
</body>
</html>
