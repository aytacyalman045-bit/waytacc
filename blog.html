<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>WAYTAC | SİBER İNFAZ ARŞİVİ</title>
    <style>
        :root { --bg: #05070a; --card: #161b22; --accent: #2f81f7; --text: #8b949e; --code: #0d1117; }
        body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; margin: 0; padding: 15px; }
        .container { max-width: 800px; margin: auto; }
        .header { text-align: center; padding: 50px 0; border-bottom: 2px solid var(--accent); margin-bottom: 40px; }
        .header h1 { color: #fff; letter-spacing: 5px; margin: 0; font-size: 2.2em; cursor: pointer; }
        
        /* 🗝️ ADMIN PANEL STİLLERİ */
        #admin-panel { background: var(--card); border: 2px solid var(--accent); border-radius: 15px; padding: 25px; margin-bottom: 30px; display: none; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; background: var(--code); border: 1px solid #30363d; color: white; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* 📁 ARCHIVE STİLLERİ */
        .accordion { background: var(--card); border: 1px solid #30363d; border-radius: 12px; margin-bottom: 15px; overflow: hidden; position: relative; }
        .acc-header { padding: 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .acc-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease-out; background: var(--code); }
        .tag { color: var(--accent); font-weight: bold; font-size: 0.7em; border: 1px solid var(--accent); padding: 2px 6px; border-radius: 4px; }
        .inner-padding { padding: 20px; border-top: 1px solid #30363d; }
        .delete-btn { position: absolute; right: 50px; top: 20px; color: #ff7b72; cursor: pointer; font-size: 0.8em; z-index: 10; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 onclick="toggleAdmin()">WAYTAC ARCHIVE</h1>
            <p>Operasyonel İstihbarat Mahzenleri</p>
        </div>

        <!-- 🔒 OPERATÖR PANELİ (GİZLİ) -->
        <div id="admin-panel">
            <h3 style="color:white; margin-top:0;">🛠️ OPERASYON EKLE</h3>
            <input type="text" id="op-tag" placeholder="Etiket (Örn: DEŞİFRE, INFECT)">
            <input type="text" id="op-title" placeholder="Operasyon Başlığı">
            <textarea id="op-details" placeholder="Detaylar (Her satır bir madde)"></textarea>
            <button class="btn" onclick="saveOp()">KARARGAHA MÜHÜRLE</button>
        </div>

        <!-- 📂 DİNAMİK ARŞİV ALANI -->
        <div id="archive-list"></div>
    </div>

    <script>
        // 🗝️ Admin Paneli Açma (Başlığa 5 kere tıkla)
        let clickCount = 0;
        function toggleAdmin() {
            clickCount++;
            if(clickCount >= 5) {
                document.getElementById('admin-panel').style.display = 'block';
                clickCount = 0;
            }
        }

        // 💾 Operasyonu Hafızaya Kaydet
        function saveOp() {
            const tag = document.getElementById('op-tag').value;
            const title = document.getElementById('op-title').value;
            const details = document.getElementById('op-details').value.split('\n');

            if(!title) return alert("Başlık girilmedi!");

            const ops = JSON.parse(localStorage.getItem('waytac_ops') || '[]');
            ops.push({ tag, title, details });
            localStorage.setItem('waytac_ops', JSON.stringify(ops));
            
            location.reload(); // Karargahı yenile
        }

        // 🗑️ Operasyonu Sil
        function deleteOp(index) {
            if(confirm("Bu operasyon kaydı imha edilsin mi?")) {
                let ops = JSON.parse(localStorage.getItem('waytac_ops'));
                ops.splice(index, 1);
                localStorage.setItem('waytac_ops', JSON.stringify(ops));
                location.reload();
            }
        }

        // 🏗️ Arşivi İnşa Et
        function loadArchive() {
            const list = document.getElementById('archive-list');
            const ops = JSON.parse(localStorage.getItem('waytac_ops') || '[]');

            list.innerHTML = ops.map((op, i) => `
                <div class="accordion">
                    <div class="delete-btn" onclick="deleteOp(${i})">İmha Et</div>
                    <div class="acc-header" onclick="toggleAcc(this)">
                        <h2><span class="tag">${op.tag}</span> ${op.title}</h2>
                        <span>▼</span>
                    </div>
                    <div class="acc-content">
                        <div class="inner-padding">
                            <b>🔍 Operasyon Detayları:</b>
                            <ul>${op.details.map(d => `<li>${d}</li>`).join('')}</ul>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function toggleAcc(header) {
            const content = header.nextElementSibling;
            content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight + "px";
        }

        loadArchive();
    </script>
</body>
</html>
